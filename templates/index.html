<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Exam Predictor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
            text-align: center;
        }

        .wrapper h1 {
            font-size: 2.3rem;
            margin-bottom: 18px;
        }

        .wrapper p {
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 30px;
            color: #e8ecff;
        }

        .button-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 14px;
        }

        .btn {
            display: inline-block;
            padding: 14px 28px;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6c63ff, #8a50ff);
            color: #fff;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.18);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.35);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.16);
        }

        @media (max-width: 600px) {
            .wrapper {
                padding: 24px;
            }

            .wrapper h1 {
                font-size: 1.8rem;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h1>Welcome to Student Exam Performance Predictor</h1>
        <p>Click the button below to go to the prediction page and estimate a student's exam performance using the Flask app.</p>
        <div class="button-group">
            <a class="btn btn-primary" href="{{ url_for('predict_datapoint') }}">Go to Prediction Page</a>
            <a class="btn btn-secondary" href="{{ url_for('index') }}">Refresh Home Page</a>
        </div>
    </div>
</body>
</html>
