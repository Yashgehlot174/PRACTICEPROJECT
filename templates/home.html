<html>
<head>
    <title>Student Exam Performance Predictor</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#667eea,#764ba2);
            padding:30px;
        }

        .login{
            width:100%;
            max-width:750px;
            background:#ffffff;
            padding:35px;
            border-radius:20px;
            box-shadow:0 15px 40px rgba(0,0,0,0.2);
        }

        .login h1:first-child{
            text-align:center;
            color:#2c3e50;
            margin-bottom:25px;
            font-size:2rem;
        }

        legend{
            text-align:center;
            font-size:1.5rem;
            font-weight:600;
            color:#4a5568;
            margin-bottom:20px;
        }

        .mb-3{
            margin-bottom:18px;
        }

        .form-label{
            display:block;
            margin-bottom:8px;
            font-weight:600;
            color:#34495e;
        }

        .form-control{
            width:100%;
            padding:12px 15px;
            border:1px solid #dcdde1;
            border-radius:10px;
            font-size:15px;
            transition:all 0.3s ease;
        }

        .form-control:focus{
            outline:none;
            border-color:#667eea;
            box-shadow:0 0 8px rgba(102,126,234,0.3);
        }

        select{
            cursor:pointer;
        }

        .btn-primary{
            width:100%;
            padding:14px;
            border:none;
            border-radius:10px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:all 0.3s ease;
        }

        .btn-primary:hover{
            transform:translateY(-2px);
            box-shadow:0 10px 20px rgba(102,126,234,0.3);
        }

        h2{
            margin-top:25px;
            text-align:center;
            padding:15px;
            border-radius:10px;
            background:#f1f5f9;
            color:#2c3e50;
            font-weight:600;
        }

        @media(max-width:768px){
            .login{
                padding:20px;
            }

            .login h1:first-child{
                font-size:1.6rem;
            }
        }
    </style>
</head>

<body>
    <div class="login">
       <h1>Student Exam Performance Indicator</h1>
       <div style="text-align:right; margin-bottom: 20px;">
           <a class="btn btn-secondary" href="{{ url_for('index') }}" style="padding:10px 18px; font-size:0.95rem;">Back to Home</a>
       </div>

       <form action="{{ url_for('predict_datapoint')}}" method="post">
        <h1>
            <legend>Student Exam Performance Prediction</legend>
        </h1>

        <div class="mb-3">
            <label class="form-label">Gender</label>
            <select class="form-control" name="gender" placeholder="Enter you Gender" required>
                <option class="placeholder" selected disabled value="">Select your Gender</option>
                <option value="male">
                    Male
                </option>
                <option value="female">
                    Female
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Race or Ethnicity</label>
            <select class="form-control" name="ethnicity" placeholder="Enter you ethnicity" required>
                <option class="placeholder" selected disabled value="">Select Ethnicity</option>
                <option value="group A">
                    Group A
                </option>
                <option value="group B">
                    Group B
                </option>
                <option value="group C">
                    Group C
                </option>
                <option value="group D">
                    Group D
                </option>
                <option value="group E">
                    Group E
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Parental Level of Education</label>
            <select class="form-control" name="parental_level_of_education"
                placeholder="Enter you Parent Education" required>
                <option class="placeholder" selected disabled value="">Select Parent Education</option>
                <option value="associate's degree">
                    associate's degree
                </option>
                <option value="bachelor's degree">
                    bachelor's degree
                </option>
                <option value="high school">
                    high school
                </option>
                <option value="master's degree">
                    master's degree
                </option>
                <option value="some college">
                    some college
                </option>
                <option value="some high school">
                    some high school
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Lunch Type</label>
            <select class="form-control" name="lunch" placeholder="Enter you Lunch" required>
                <option class="placeholder" selected disabled value="">Select Lunch Type</option>
                <option value="free/reduced">
                    free/reduced
                </option>
                <option value="standard">
                    standard
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Test preparation Course</label>
            <select class="form-control" name="test_preparation_course" placeholder="Enter you Course"
                required>
                <option class="placeholder" selected disabled value="">Select Test_course</option>
                <option value="none">
                    None
                </option>
                <option value="completed">
                    Completed
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Writing Score out of 100</label>
            <input class="form-control" type="number" name="reading_score"
                placeholder="Enter your Reading score" min='0' max='100' />
        </div>

        <div class="mb-3">
            <label class="form-label">Reading Score out of 100</label>
            <input class="form-control" type="number" name="writing_score"
                placeholder="Enter your Reading Score" min='0' max='100' />
        </div>

        <div class="mb-3">
            <input class="btn btn-primary" type="submit" value="Predict your Maths Score" required />
        </div>
    </form>

    <h2>
       THE prediction is {{results}}
    </h2>

</div>
</body>
</html>
